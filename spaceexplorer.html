<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: white;
    }
    canvas#stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Trang 1 */
    .game-font {
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      color: cyan;
      text-shadow: 0 0 10px cyan, 0 0 20px blue;
    }
    .title {
      font-size: clamp(36px, 8vw, 72px);
      margin-bottom: 40px;
    }
    .press-start {
      font-size: clamp(18px, 4vw, 32px);
      border: 3px solid cyan;
      padding: 15px 30px;
      animation: blink 0.8s step-start infinite;
      cursor: pointer;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Trang 2 */
    .menu-font {
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: cyan;
      text-shadow: 0 0 10px cyan, 0 0 20px blue;
      font-size: clamp(16px, 3.5vw, 28px);
    }
    .menu-box {
      border: 3px solid cyan;
      padding: 15px;
      margin: 10px;
      width: fit-content;
      min-width: 250px;
      transition: background 0.3s, color 0.3s;
    }
    .menu-box:hover {
      background: cyan;
      color: black;
    }

    /* Trang 3–16 */
    .type-font {
      font-family: 'Courier New', monospace;
      color: white;
      text-shadow: 0 0 10px #fff, 0 0 20px #aaa;
      font-size: clamp(14px, 3.5vw, 20px);
      line-height: 1.6;
      max-width: 850px;
      padding: 0 15px;
    }

    /* Note */
    .note {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: clamp(12px, 3vw, 16px);
      font-family: 'Courier New', monospace;
      color: #bbb;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div id="content" class="container"></div>
  <div id="note" class="note" style="display:none;">Bấm trái: Quay lại / Bấm phải: Chuyển trang</div>

  <!-- Giữ lại nhạc nền GitHub, phát từ page 3 -->
  <audio id="bg-music" loop>
    <source src="https://github.com/vietduygiapdz/spaceexplorer/blob/7d143fec2a8712787b292473c5bf120d22f49341/SOOBIN%20-%20Dancing%20In%20The%20Dark%20%20'BA%CC%A3%CC%82T%20NO%CC%81%20LE%CC%82N'%20Album%20(Official%20MV)%20-%20SOOBIN%20Official.mp3?raw=true" type="audio/mpeg">
  </audio>

  <script>
    const pages = [
      { html: `<div class="game-font title">SPACE EXPLORER GAME</div><div class="game-font press-start">PRESS START</div>` },
      { html: `<div class="menu-font">Hướng dẫn chi tiết:</div>
               <div class="menu-font menu-box">Bấm sang trái để quay lại giao diện chính</div>
               <div class="menu-font menu-box">Bấm sang phải để sang mục tiếp theo</div>` },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." },
      { text: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since 1966, when designers at Letraset and James Mosley, the librarian at St Bride Printing Library in London, took a 1914 Cicero translation and scrambled it to make dummy text for Letraset's Body Type sheets." }
    ];

    let currentPage = 0;
    const contentDiv = document.getElementById('content');
    const noteDiv = document.getElementById('note');
    const audio = document.getElementById('bg-music');

    function showPage(index) {
      contentDiv.innerHTML = '';
      noteDiv.style.display = 'none';
      const page = pages[index];

      if (page.html) {
        contentDiv.innerHTML = page.html;

        // PRESS START sang trang 2
        if (index === 0) {
          const pressStart = document.querySelector('.press-start');
          if (pressStart) {
            pressStart.addEventListener('click', (e) => {
              e.stopPropagation();
              currentPage = 1;
              showPage(currentPage);
            });
          }
        }

      } else if (page.text) {
        const textDiv = document.createElement('div');
        textDiv.className = 'type-font';
        contentDiv.appendChild(textDiv);
        let i = 0;
        function typeWriter() {
          if (i < page.text.length) {
            textDiv.textContent += page.text.charAt(i);
            i++;
            setTimeout(typeWriter, 36);
          }
        }
        typeWriter();
        noteDiv.style.display = 'block';

       
        if (index === 2 && audio.paused) {
          audio.play().catch(err => console.log("Autoplay bị chặn:", err));
        }
      }
    }

    document.body.addEventListener('click', function(e) {
      if (e.target.classList.contains('press-start')) return; 
      if (e.clientX < window.innerWidth / 2) {
        if (currentPage > 0) currentPage--;
      } else {
        if (currentPage < pages.length - 1) currentPage++;
      }
      showPage(currentPage);
    });

    showPage(currentPage);

    // Background sao
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = Array.from({length: 200}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 0.5,
        o: Math.random() * 0.4 + 0.2 
      }));
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${s.o})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      updateStars();
    }

    function updateStars() {
      stars.forEach(s => {
        s.y += s.d;
        if (s.y > canvas.height) {
          s.y = 0;
          s.x = Math.random() * canvas.width;
        }
      });
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    setInterval(drawStars, 50);
  </script>
</body>
</html>
